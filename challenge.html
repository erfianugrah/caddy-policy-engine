<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Verifying your connection</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:#1a1b26;color:#c0caf5;display:flex;align-items:center;justify-content:center;
min-height:100vh;padding:1rem}
.container{max-width:420px;width:100%;text-align:center}
h1{font-size:1.25rem;font-weight:600;margin-bottom:.75rem;color:#7aa2f7}
p{font-size:.875rem;color:#9aa5ce;margin-bottom:1rem;line-height:1.5}
#challenge-status{font-size:.8rem;color:#9aa5ce;margin-bottom:.75rem}
.progress{width:100%;height:6px;background:#24283b;border-radius:3px;overflow:hidden;margin-bottom:1.5rem}
.progress-inner{height:100%;width:0;background:linear-gradient(90deg,#7aa2f7,#bb9af7);
border-radius:3px;transition:width .3s ease}
.info{font-size:.75rem;color:#565f89;line-height:1.5;border-top:1px solid #24283b;padding-top:1rem}
noscript p{color:#f7768e;font-weight:500}
</style>
</head>
<body>
<div class="container">
<h1>Verifying your connection</h1>
<p>Please wait while we verify your browser.</p>
<div id="challenge-status">Initializing...</div>
<div class="progress">
<div id="challenge-progress-inner" class="progress-inner"></div>
</div>
<noscript>
<p>JavaScript is required to access this site. This is necessary because
automated scrapers have changed the economics of web hosting.</p>
</noscript>
<div class="info">
This check confirms you are using a real browser. It typically completes in under a second.
</div>
</div>
<script id="challenge-data" type="application/json">{{CHALLENGE_DATA}}</script>
<script>{{CHALLENGE_JS}}</script>
</body>
</html>
